version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: music_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: music_admin
      POSTGRES_PASSWORD: music_secret_2024
      POSTGRES_DB: music_streaming
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: music_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
